<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="UMBRIS · the Closed Eclipse">
  <title>UMBRIS · the Closed Eclipse</title>
  <desc>A pure black umbra ringed by a cosmic-violet corona with a warm diamond-ring flash at one o'clock. The brand mark of UMBRIS.</desc>

  <!-- transparent background -->

  <!-- outermost faint halo -->
  <circle cx="160" cy="160" r="150" fill="none" stroke="#9C7BD9" stroke-width="1" opacity="0.10"/>

  <!-- outer corona · soft -->
  <circle cx="160" cy="160" r="130" fill="none" stroke="#9C7BD9" stroke-width="3" opacity="0.18"/>

  <!-- mid corona -->
  <circle cx="160" cy="160" r="113" fill="none" stroke="#9C7BD9" stroke-width="4" opacity="0.32"/>

  <!-- inner corona · brightest -->
  <circle cx="160" cy="160" r="98" fill="none" stroke="#9C7BD9" stroke-width="3" opacity="0.85"/>

  <!-- umbra · the pure black disc -->
  <circle cx="160" cy="160" r="94" fill="#000000"/>

  <!-- diamond-ring flash · warm point at 1 o'clock (about 60° from horizontal, up-right) -->
  <!-- position: x = 160 + cos(60°) * 96, y = 160 - sin(60°) * 96 -->
  <g transform="translate(208, 77)">
    <!-- soft warm halo -->
    <circle cx="0" cy="0" r="9" fill="#FAE6B0" opacity="0.35"/>
    <!-- brilliant core -->
    <circle cx="0" cy="0" r="4.2" fill="#FAE6B0"/>
    <circle cx="0" cy="0" r="2" fill="#FFFFFF"/>
  </g>
</svg>
